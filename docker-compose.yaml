version: "3.9"

services:
  s2scs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - S2SCS_CONFIG_PATH=/app/configs/config.yaml
      - TRANSFORMERS_CACHE=/app/models
      - HF_HOME=/app/models
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  s2scs-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - S2SCS_CONFIG_PATH=/app/configs/config.yaml
      - CUDA_VISIBLE_DEVICES=""
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    restart: unless-stopped